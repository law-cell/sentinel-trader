services:

  # ── IB Gateway ──────────────────────────────────────────────────────────────
  # Headless IB Gateway running in a container.
  # sentinel-trader connects to it via the service hostname "ib-gateway".
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      # On 2FA timeout: restart instead of exiting
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      # Auto-dismiss "Existing session detected" dialog
      EXISTING_SESSION_DETECTED_ACTION: primary
      AUTO_RESTART_TIME: "11:59 PM"
      TIME_ZONE: Europe/Dublin
      READ_ONLY_API: "no"
      BYPASS_WARNING: "yes"
    ports:
      # Expose gateway ports to host for debugging (optional)
      - "4001:4001"   # live
      - "4002:4002"   # paper

  # ── SentinelTrader ──────────────────────────────────────────────────────────
  sentinel-trader:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # In docker-compose, containers talk via service name (not localhost)
      - IB_HOST=${IB_HOST}
      - IB_PORT=${IB_PORT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./rules.json:/app/rules.json
    depends_on:
      - ib-gateway
    restart: unless-stopped
