services:
  sentinel-trader:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override IB_HOST so the container can reach TWS on the host machine.
      # Docker Desktop (Windows/Mac): host.docker.internal resolves automatically.
      # Linux: the extra_hosts entry below maps it to the host gateway.
      - IB_HOST=${IB_HOST:-host.docker.internal}
      - IB_PORT=${IB_PORT:-7497}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    extra_hosts:
      # Linux host networking: makes host.docker.internal resolve to the host
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
