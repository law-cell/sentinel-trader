AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SentinelTrader - Plan B deployment (no ALB).
  ECS Fargate task gets a dynamic public IP. Port 8000 is open to the internet.
  Access the app at http://<task-public-ip>:8000 after deployment.

# ─── Parameters ───────────────────────────────────────────────────────────────

Parameters:
  ImageUri:
    Type: String
    Description: Full ECR image URI (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/sentinel-trader:latest)

  TelegramBotToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Telegram bot token for trade notifications (optional)

  TelegramChatId:
    Type: String
    Default: ''
    Description: Telegram chat ID for trade notifications (optional)

  TwsUserId:
    Type: String
    Description: Interactive Brokers username (TWS_USERID)

  TwsPassword:
    Type: String
    NoEcho: true
    Description: Interactive Brokers password (TWS_PASSWORD)

  TradingMode:
    Type: String
    Default: paper
    AllowedValues: [paper, live]
    Description: IB Gateway trading mode — paper (port 4002) or live (port 4001)

  IbPort:
    Type: Number
    Default: 4002
    Description: IB Gateway port (4002=paper, 4001=live)

  IbClientId:
    Type: Number
    Default: 1

# ─── Resources ────────────────────────────────────────────────────────────────

Resources:

  # ── Networking ──────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: sentinel-trader-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: sentinel-trader-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      # Pick the first AZ in the region automatically
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: sentinel-trader-public-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: sentinel-trader-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── Security Group ──────────────────────────────────────────────────────────

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound port 8000 for SentinelTrader
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
          Description: HTTP access to FastAPI
      Tags:
        - Key: Name
          Value: sentinel-trader-sg

  # ── IAM ─────────────────────────────────────────────────────────────────────

  # ECS needs this role to pull images from ECR and write logs to CloudWatch
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sentinel-trader-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ── CloudWatch Logs ─────────────────────────────────────────────────────────

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/sentinel-trader
      RetentionInDays: 7

  # ── ECS ─────────────────────────────────────────────────────────────────────

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: sentinel-trader
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: sentinel-trader
      Cpu: '512'      # 0.5 vCPU — IB Gateway needs more than 0.25
      Memory: '1024'  # 1 GB
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:

        # ── IB Gateway sidecar ──────────────────────────────────────────────
        # Runs alongside sentinel-trader in the same Task.
        # Both containers share the awsvpc network namespace → localhost.
        - Name: ib-gateway
          Image: ghcr.io/gnzsnz/ib-gateway:latest
          Essential: true
          PortMappings:
            - ContainerPort: 4001    # live gateway port
              Protocol: tcp
            - ContainerPort: 4002    # paper gateway port
              Protocol: tcp
          Environment:
            - Name: TWS_USERID
              Value: !Ref TwsUserId
            - Name: TWS_PASSWORD
              Value: !Ref TwsPassword
            - Name: TRADING_MODE
              Value: !Ref TradingMode
            # On 2FA timeout: restart IB Gateway instead of exiting
            - Name: TWOFA_TIMEOUT_ACTION
              Value: restart
            - Name: RELOGIN_AFTER_TWOFA_TIMEOUT
              Value: 'yes'
            # Daily auto-restart just before market open (avoids mid-session drops)
            - Name: AUTO_RESTART_TIME
              Value: '11:59 PM'
            - Name: TIME_ZONE
              Value: Europe/Dublin
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ib-gateway

        # ── SentinelTrader app ───────────────────────────────────────────────
        - Name: sentinel-trader
          Image: !Ref ImageUri
          Essential: true
          # Wait for IB Gateway to start before the app tries to connect
          DependsOn:
            - ContainerName: ib-gateway
              Condition: START
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            # Same Task = shared localhost network namespace
            - Name: IB_HOST
              Value: '127.0.0.1'
            - Name: IB_PORT
              Value: !Sub '${IbPort}'
            - Name: IB_CLIENT_ID
              Value: !Sub '${IbClientId}'
            - Name: TELEGRAM_BOT_TOKEN
              Value: !Ref TelegramBotToken
            - Name: TELEGRAM_CHAT_ID
              Value: !Ref TelegramChatId
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: sentinel-trader

  ECSService:
    Type: AWS::ECS::Service
    # Service needs the subnet route to the IGW to pull ECR images
    DependsOn: PublicRoute
    Properties:
      ServiceName: sentinel-trader
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          # ENABLED = Fargate assigns a dynamic public IP to the task ENI
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet
          SecurityGroups:
            - !Ref AppSecurityGroup

# ─── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Description: ECS Cluster name

  ServiceName:
    Value: !GetAtt ECSService.Name
    Description: ECS Service name

  Note:
    Value: >
      The task gets a dynamic public IP on each start.
      Run: aws ecs list-tasks --cluster sentinel-trader --service-name sentinel-trader
      then: aws ecs describe-tasks --cluster sentinel-trader --tasks <task-arn>
      to find the ENI, then: aws ec2 describe-network-interfaces --network-interface-ids <eni-id>
      to get the public IP. The deploy.sh script does this automatically.
